<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Tracker (Auto-Save) 2026</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --success: #34a853;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 10px;
            margin: 0;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin: 0;
        }

        .brand {
            text-align: center;
            color: #555;
            font-weight: bold;
            margin-bottom: 15px;
        }

        select#monthSelect {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: #666;
            padding-bottom: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
            position: relative;
            font-size: 14px;
        }

        .day.has-milk {
            background: #e8f0fe;
            border-color: var(--primary);
        }

        .day .qty-label {
            font-size: 10px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 2px;
        }

        /* Modal / Popup Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 30% auto;
            padding: 20px;
            border-radius: 12px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        .qty-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            background: white;
        }

        .qty-btn:hover {
            background: #f0f0f0;
        }

        .qty-btn.cancel {
            color: red;
            border-color: red;
        }

        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #222;
            color: white;
            border-radius: 12px;
            text-align: center;
        }

        .grand-total {
            font-size: 28px;
            font-weight: bold;
            color: #ffeb3b;
        }

        .pay-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-decoration: none;
            box-sizing: border-box;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Milk Diary 2026 🥛</h2>
        <div class="brand">Amul Full Cream Milk</div>

        <select id="monthSelect" onchange="initCalendar()"></select>

        <div id="calendarGrid" class="calendar-grid"></div>

        <div class="summary">
            <div>Total Liters: <span id="totalLiters">0</span>L</div>
            <div class="grand-total" id="grandTotalText">₹0</div>
            <a id="upiLink" href="#" class="pay-btn" style="display:none;">PAY VIA UPI APP</a>
            <button class="clear-btn" onclick="clearMonthData()">Clear this month's data</button>
        </div>
    </div>

    <div id="qtyModal" class="modal">
        <div class="modal-content">
            <h3 id="modalDateTitle">Select Quantity</h3>
            <button class="qty-btn" onclick="setQuantity(1)">1 Liter (₹69)</button>
            <button class="qty-btn" onclick="setQuantity(2)">2 Liters (₹136)</button>
            <button class="qty-btn" onclick="setQuantity(3)">3 Liters (₹205)</button>
            <button class="qty-btn" onclick="setQuantity(4)">4 Liters (₹272)</button>
            <button class="qty-btn cancel" onclick="setQuantity(0)">No Milk (Reset)</button>
            <button class="qty-btn" style="background:#eee" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const prices = { 0: 0, 1: 69, 2: 136, 3: 205, 4: 272 };
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const UPI_ID = "9818215478@pthdfc";
        const year = 2026;

        let selectedData = {};
        let activeDay = null;

        const monthSelect = document.getElementById('monthSelect');
        months.forEach((m, i) => {
            let opt = document.createElement('option');
            opt.value = i; opt.textContent = m;
            if (i === new Date().getMonth()) opt.selected = true;
            monthSelect.appendChild(opt);
        });

        function initCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const month = parseInt(monthSelect.value);

            // --- LOAD DATA FROM LOCAL STORAGE ---
            const saved = localStorage.getItem(`milk_data_${year}_${month}`);
            selectedData = saved ? JSON.parse(saved) : {};

            const headers = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            headers.forEach(h => {
                const div = document.createElement('div');
                div.className = 'day-header'; div.innerText = h; grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.id = `day-${d}`;

                // Apply loaded data
                let qtyLabel = "";
                if (selectedData[d]) {
                    dayEl.classList.add('has-milk');
                    qtyLabel = selectedData[d] + 'L';
                }

                dayEl.innerHTML = `<span>${d}</span><div class="qty-label" id="label-${d}">${qtyLabel}</div>`;
                dayEl.onclick = () => openModal(d);
                grid.appendChild(dayEl);
            }
            calculateTotal();
        }

        function openModal(day) {
            activeDay = day;
            document.getElementById('modalDateTitle').innerText = `${day} ${months[monthSelect.value]}`;
            document.getElementById('qtyModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('qtyModal').style.display = 'none'; }

        function setQuantity(qty) {
            const month = monthSelect.value;
            const dayEl = document.getElementById(`day-${activeDay}`);
            const label = document.getElementById(`label-${activeDay}`);

            if (qty > 0) {
                selectedData[activeDay] = qty;
                dayEl.classList.add('has-milk');
                label.innerText = qty + 'L';
            } else {
                delete selectedData[activeDay];
                dayEl.classList.remove('has-milk');
                label.innerText = '';
            }

            // --- SAVE TO LOCAL STORAGE ---
            localStorage.setItem(`milk_data_${year}_${month}`, JSON.stringify(selectedData));

            closeModal();
            calculateTotal();
        }

        function clearMonthData() {
            if (confirm("Are you sure you want to clear all data for this month?")) {
                localStorage.removeItem(`milk_data_${year}_${monthSelect.value}`);
                initCalendar();
            }
        }

        function calculateTotal() {
            let totalAmount = 0;
            let totalLiters = 0;

            for (let day in selectedData) {
                const qty = selectedData[day];
                totalLiters += qty;
                totalAmount += prices[qty];
            }

            document.getElementById('totalLiters').innerText = totalLiters;
            document.getElementById('grandTotalText').innerText = `₹${totalAmount}`;

            const upiBtn = document.getElementById('upiLink');
            if (totalAmount > 0) {
                const upiUrl = `upi://pay?pa=${UPI_ID}&pn=MilkVendor&am=${totalAmount}&cu=INR&tn=MilkBill_${months[monthSelect.value]}`;
                upiBtn.href = upiUrl;
                upiBtn.style.display = 'block';
            } else {
                upiBtn.style.display = 'none';
            }
        }

        initCalendar();
    </script>

</body>

</html>
